name: CI

on:
  push:
    branches: [main, develop, 'feature/**']
  pull_request:
    branches: [main, develop]

env:
  DOTNET_VERSION: '8.0.x'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password123!
          POSTGRES_DB: taskmanager_db
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Run unit tests
        run: dotnet test test/UnitTests/ --no-build --configuration Release --verbosity normal --logger trx --results-directory TestResults/

      - name: Run integration tests
        run: dotnet test test/IntegrationTests/ --no-build --configuration Release --verbosity normal --logger trx --results-directory TestResults/
        env:
          ConnectionStrings__DefaultConnection: "Host=localhost;Port=5433;Database=taskmanager_db;Username=postgres;Password=password123!"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: TestResults/
          retention-days: 14

  docker:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t taskmanager-api:${{ github.sha }} .

      - name: Verify Docker image
        run: docker run --rm taskmanager-api:${{ github.sha }} dotnet --info
